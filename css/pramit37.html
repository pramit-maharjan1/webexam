<!DOCTYPE html>
<html>
<head>

<style>

.box{

width:100px;
height:100px;

background:red;

animation-name:move;

animation-duration:3s;

animation-delay:1s;

animation-iteration-count:infinite;

animation-direction:alternate;

animation-timing-function:ease-in-out;

}

@keyframes move{

0%{
transform:translateX(0);
}

50%{
transform:translateX(200px) rotate(180deg) scale(1.5);
background:blue;
opacity:0.5;
}

100%{
transform:translateX(0);
}

}

</style>

</head>

<body>

<div class="box"></div>

</body>
</html>
